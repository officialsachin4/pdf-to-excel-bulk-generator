<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF to Excel Converter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <h1>PDF to Excel Converter</h1>

  <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">

    <label for="pdfFiles" data-row="01">
      Select PDF file(s)
      <input type="file" id="pdfFiles" name="pdfFiles" accept=".pdf" multiple required>
    </label>

    <fieldset data-row="02">
      <legend>Processing mode</legend>
      <label>
        <input type="radio" name="processingOption" value="tablesOnly" checked>
        Tables only (structured tables, verbatim)
      </label>
      <label>
        <input type="radio" name="processingOption" value="allText">
        Full text + tables interleaved
      </label>
    </fieldset>

    <fieldset data-row="03">
      <legend>Sheet layout</legend>
      <label>
        <input type="radio" name="sheetLayout" value="per_pdf" checked>
        One sheet per PDF
      </label>
      <label>
        <input type="radio" name="sheetLayout" value="per_table">
        One sheet per table
      </label>
      <label>
        <input type="radio" name="sheetLayout" value="single">
        Single sheet, all PDFs stacked
      </label>
    </fieldset>

    <button type="submit">Convert to Excel</button>
  </form>
</body>
</html>
